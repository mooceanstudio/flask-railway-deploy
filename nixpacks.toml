# Nixpacks build configuration for Railway.
# Pins the Python runtime and wires the release + start commands so that
# migrations run automatically before gunicorn boots.

[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
]

[phases.build]
cmds = ["chmod +x ./start.sh"]

[start]
cmd = "./start.sh"

[variables]
FLASK_APP = "app:create_app"
