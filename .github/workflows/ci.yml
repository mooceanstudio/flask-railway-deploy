name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-sqlite:
    name: Tests (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Apply migrations
        env:
          FLASK_APP: app:create_app
          APP_SETTINGS: development
        run: flask db upgrade

      - name: Run tests
        run: pytest -v

  test-postgres:
    name: Tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: feedback
          POSTGRES_PASSWORD: feedback
          POSTGRES_DB: feedback_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U feedback"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://feedback:feedback@localhost:5432/feedback_test
      TEST_DATABASE_URL: postgres://feedback:feedback@localhost:5432/feedback_test
      APP_SETTINGS: production
      FLASK_APP: app:create_app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Apply migrations against Postgres
        run: flask db upgrade

      - name: Run tests against Postgres
        run: pytest -v

  e2e-selenium:
    name: Selenium E2E (Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Chromium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Selenium E2E test
        run: pytest tests/test_e2e_selenium.py -v
